<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Настройка Телеграм</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p.info {
            font-size: 16px;
            line-height: 1.5;
            color: #666;
            margin-bottom: 20px;
        }

        .status {
            font-size: 22px;
            font-weight: bold;
            margin: 15px 0 25px 0;
            min-height: 30px;
            color: #888;
        }

        button {
            width: 100%;
            padding: 25px 10px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.1s;
            box-sizing: border-box;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-connect {
            background-color: #2aabee;
            color: white;
            box-shadow: 0 5px 15px rgba(42, 171, 238, 0.4);
        }

        .btn-next {
            background-color: #e4e6eb;
            color: #333;
        }

        .green {
            color: #4caf50;
        }

        .red {
            color: #f44336;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Прокси для Телеграм</h1>
        <p class="info">
            Нажмите <b>«Подключить»</b> — откроется Telegram.<br>
            Если он долго не подключается, вернитесь сюда и нажмите <b>«Другой прокси»</b>.
        </p>

        <div id="statusText" class="status">Загрузка списка...</div>

        <button class="btn-connect" onclick="connectProxy()">Подключить прокси</button>
        <button class="btn-next" onclick="nextProxy()">Дать другой</button>
    </div>

    <script>
        let proxies = [];
        let currentIndex = 0;
        const statusEl = document.getElementById('statusText');

        // Функция загрузки списка прокси при открытии страницы
        async function loadProxies() {
            currentIndex = 0;
            document.querySelector('.btn-connect').style.opacity = '1';
            document.querySelector('.btn-next').style.opacity = '1';
            
            console.log("[App] Запуск загрузки списка прокси...");
            statusEl.innerText = "Ищем рабочие прокси...";
            statusEl.className = "status";
            try {
                // Список нескольких надежных репозиториев для максимального объема прокси
                const sources = [
                    'https://raw.githubusercontent.com/Argh94/Proxy-List/main/MTProto.txt',
                    'https://raw.githubusercontent.com/SoliSpirit/mtproto/master/all_proxies.txt',
                    'https://raw.githubusercontent.com/ALIILAPRO/MTProtoProxy/main/mtproto.txt',
                    'https://raw.githubusercontent.com/hookzof/socks5_list/master/tg/mtproto.txt'
                ];

                const fetches = sources.map(url => fetch(url).then(res => res.ok ? res.text() : '').catch(() => ''));
                const results = await Promise.all(fetches);
                const combinedText = results.join('\n');
                
                console.log("[App] Файлы со списками скачаны. Общий размер:", combinedText.length, "байт");

                // Находим все ссылки форматов tg://proxy или https://t.me/proxy
                const matches = combinedText.match(/(tg:\/\/proxy\?|https:\/\/t\.me\/proxy\?)[^\s"']+/g) || [];

                // Приводим все к deep-link формату tg://proxy
                const allLinks = matches.map(link => link.replace('https://t.me/proxy?', 'tg://proxy?'));
                
                // Удаляем дубликаты
                proxies = [...new Set(allLinks)];
                console.log("[App] Найдено уникальных прокси со всех источников:", proxies.length);

                // Перемешиваем массив (алгоритм Фишера-Йетса)
                for (let i = proxies.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [proxies[i], proxies[j]] = [proxies[j], proxies[i]];
                }

                if (proxies.length > 0) {
                    statusEl.innerText = `Собрано ${proxies.length} случайных прокси!`;
                } else {
                    console.warn("[App] Ни в одном из скачанных файлов не найдено ссылок формата tg://proxy");
                    statusEl.innerText = "Ошибка: не удалось найти рабочие списки";
                    statusEl.className = "status red";
                }
            } catch (e) {
                console.error("[App] Ошибка при скачивании списков прокси:", e);
                statusEl.innerText = "Ошибка загрузки данных";
                statusEl.className = "status red";
            }
        }

        // 1. Кнопка "Подключить"
        function connectProxy() {
            if (currentIndex >= proxies.length && proxies.length > 0) {
                alert("Больше прокси нет. Зайдите на сайт позже.");
                return;
            }
            if (proxies.length > 0 && proxies[currentIndex]) {
                console.log("[App] Нажата кнопка 'Подключить', используем случайный прокси:", proxies[currentIndex]);
                window.location.href = proxies[currentIndex];
                statusEl.innerText = "Проверяйте в Telegram!";
                statusEl.className = "status green";
            } else {
                console.warn("[App] Попытка подключения, но список прокси пуст или не загружен");
                alert("Подождите загрузки списка или перезагрузите страницу.");
            }
        }

        // 2. Кнопка "Другой прокси"
        function nextProxy() {
            if (proxies.length > 0) {
                currentIndex++;
                if (currentIndex >= proxies.length) {
                    console.log("[App] Список прокси закончился.");
                    statusEl.innerText = "Больше прокси нет, зайдите на сайт позже.";
                    statusEl.className = "status red";
                    
                    document.querySelector('.btn-connect').style.opacity = '0.5';
                    document.querySelector('.btn-next').style.opacity = '0.5';
                } else {
                    console.log("[App] Нажата кнопка 'Другой прокси', переключаем на индекс:", currentIndex);
                    statusEl.innerText = `Случайный прокси #${currentIndex + 1} из ${proxies.length}`;
                    statusEl.className = "status";
                }
            } else {
                console.warn("[App] Попытка переключения, но список пуст. Вызываем повторную загрузку.");
                loadProxies();
            }
        }

        // Запускаем загрузку списка сразу при открытии страницы
        window.onload = loadProxies;
    </script>

</body>

</html>
